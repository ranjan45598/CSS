<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color system</title>
    <style>
        #first{
            color: rgb(65, 101, 101);
            background-color: rgb(76, 63, 63);
            height: 50px;
            width: 30px;
            background-image: url(r.jpg);
            background-size: contain;
        }
        #second{
            color: rgb(182, 119, 43);
            background-color: rgb(103, 44, 158);
        }
        .button{
            color: #7d1717;
            background-color: rgba(43, 12, 72, 0.5);
        }

    </style>
</head>
<body>
    <div id="first"></div>
    <div id="second">Second</div><br>
    <button class="button">click me</button>
</body>
</html>
